name: SAATHI CI - pytest

# Trigger (Ansh's ruling 2026-07-16, replaces the earlier manual-only choice):
#   - every push to main  -> catches a broken test landing on the shared branch
#   - workflow_dispatch   -> on-demand run against ANY branch from the Actions
#     tab or `gh workflow run "SAATHI CI - pytest" --ref <branch>`
# Feature branches get no automatic runs - trigger manually when you want the
# Python-3.11-matched result that Aman's macOS (Python 3.9.6) can't produce.
# NOTE: a red run is a hard stop by team discipline; this workflow alone does
# not technically block a merge (that would need branch-protection - Ansh's
# repo-admin call, not made).
#
# Scope: Python logic only. Does NOT verify Arduino, Mosquitto, the hotspot,
# Windows firewall, the phone connection, sensor calibration, or the Snapdragon NPU.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python 3.11)
    # ubuntu-latest is faster and sufficient — hub logic is cross-platform.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: hub/requirements.txt

      - name: Install dependencies
        run: pip install -r hub/requirements.txt

      - name: Run pytest
        # Run from repo root so hub/app path resolution matches local execution.
        run: python -m pytest -q
